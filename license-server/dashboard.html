<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>License Server — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #cbd5e1; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 8px 12px; color: #64748b; font-weight: 600;
         border-bottom: 1px solid #334155; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #243044; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-active   { background: #14532d; color: #4ade80; }
    .badge-warning  { background: #713f12; color: #fbbf24; }
    .badge-grace    { background: #7c2d12; color: #fb923c; }
    .badge-blocked  { background: #450a0a; color: #f87171; }
    .badge-unknown  { background: #1e293b; color: #64748b; }

    /* Buttons */
    .btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-success { background: #16a34a; color: #fff; }

    /* Form */
    form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
    label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 4px; }
    input, select {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 0.875rem;
    }
    input:focus, select:focus { outline: none; border-color: #6366f1; }
    .btn-primary { background: #6366f1; color: #fff; padding: 8px 20px; }

    /* Refresh indicator */
    #refresh-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: #6366f1;
      transition: width 1s linear;
    }

    .empty { text-align: center; color: #475569; padding: 24px 0; font-size: 0.875rem; }
    .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 8px; }
    .success-msg { color: #4ade80; font-size: 0.8rem; margin-top: 8px; }

    @media (max-width: 900px) {
      form { grid-template-columns: 1fr 1fr; }
      table { font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div id="refresh-bar" style="width:0%"></div>

  <h1>License Server</h1>
  <p class="subtitle" id="last-updated">Cargando...</p>

  <div class="card">
    <h2>Clientes</h2>
    <table id="clients-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Paquete</th>
          <th>Status</th>
          <th>Último heartbeat</th>
          <th>Pago hasta</th>
          <th>Días restantes</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="clients-body">
        <tr><td colspan="7" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <h2>Crear cliente</h2>
    <form id="create-form">
      <div>
        <label for="f-name">Nombre</label>
        <input id="f-name" type="text" placeholder="Empresa XYZ" required />
      </div>
      <div>
        <label for="f-pkg">Paquete</label>
        <select id="f-pkg">
          <option value="basic">basic</option>
          <option value="pro">pro</option>
          <option value="enterprise">enterprise</option>
        </select>
      </div>
      <div>
        <label for="f-until">Pago hasta</label>
        <input id="f-until" type="date" required />
      </div>
      <div>
        <label>&nbsp;</label>
        <button type="submit" class="btn btn-primary">Crear</button>
      </div>
    </form>
    <div id="form-msg"></div>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    const API_BASE = "http://localhost:8080";

    // Token injected server-side from ?token= query param; fallback to URL param
    let ADMIN_TOKEN = "__INJECTED_TOKEN__";
    if (!ADMIN_TOKEN || ADMIN_TOKEN === "__INJECTED_TOKEN__") {
      const params = new URLSearchParams(window.location.search);
      ADMIN_TOKEN = params.get("token") || "";
    }

    const headers = () => ({
      "Content-Type": "application/json",
      "X-Admin-Token": ADMIN_TOKEN,
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmtDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("es-MX", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit",
      });
    }

    function statusBadge(s) {
      const map = {
        active: "badge-active",
        warning: "badge-warning",
        grace: "badge-grace",
        blocked: "badge-blocked",
      };
      return `<span class="badge ${map[s] || "badge-unknown"}">${s || "?"}</span>`;
    }

    // ── Load clients ──────────────────────────────────────────────────────────
    async function loadClients() {
      const tbody = document.getElementById("clients-body");
      try {
        const res = await fetch(`${API_BASE}/clients`, { headers: headers() });
        if (!res.ok) {
          tbody.innerHTML = `<tr><td colspan="7" class="empty error-msg">Error ${res.status}: comprueba el token.</td></tr>`;
          return;
        }
        const clients = await res.json();
        if (clients.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="empty">Sin clientes registrados.</td></tr>`;
          return;
        }
        tbody.innerHTML = clients.map(c => `
          <tr data-id="${c.id}" data-active="${c.active}">
            <td title="${c.id.slice(0,8)}">${c.name}</td>
            <td>${c.package_type}</td>
            <td>${statusBadge(c.status)}</td>
            <td>${fmtDate(c.last_heartbeat)}</td>
            <td>${c.paid_until?.slice(0,10) || "—"}</td>
            <td>${c.days_remaining ?? "—"}</td>
            <td>
              ${c.active
                ? `<button class="btn btn-danger" onclick="blockClient('${c.id}')">Bloquear</button>`
                : `<button class="btn btn-success" onclick="unblockClient('${c.id}')">Desbloquear</button>`
              }
            </td>
          </tr>
        `).join("");
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty error-msg">Error de red: ${e.message}</td></tr>`;
      }
      document.getElementById("last-updated").textContent =
        `Actualizado: ${new Date().toLocaleString("es-MX")}`;
    }

    // ── Block / Unblock ───────────────────────────────────────────────────────
    async function blockClient(id) {
      await fetch(`${API_BASE}/clients/${id}/block`, {
        method: "POST", headers: headers(),
      });
      loadClients();
    }

    async function unblockClient(id) {
      await fetch(`${API_BASE}/clients/${id}/unblock`, {
        method: "POST", headers: headers(),
      });
      loadClients();
    }

    // ── Create client ─────────────────────────────────────────────────────────
    document.getElementById("create-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("form-msg");
      msg.textContent = "";

      const body = {
        name: document.getElementById("f-name").value.trim(),
        package_type: document.getElementById("f-pkg").value,
        paid_until: document.getElementById("f-until").value,
      };

      try {
        const res = await fetch(`${API_BASE}/clients`, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json();
          msg.innerHTML = `<span class="error-msg">Error: ${err.detail}</span>`;
          return;
        }
        const data = await res.json();
        msg.innerHTML = `<span class="success-msg">Cliente creado. License key: <code>${data.license_key}</code></span>`;
        e.target.reset();
        loadClients();
      } catch (err) {
        msg.innerHTML = `<span class="error-msg">Error de red: ${err.message}</span>`;
      }
    });

    // ── Auto-refresh every 30s ─────────────────────────────────────────────────
    let elapsed = 0;
    const INTERVAL = 30;
    const bar = document.getElementById("refresh-bar");

    function tick() {
      elapsed++;
      const pct = (elapsed / INTERVAL) * 100;
      bar.style.width = pct + "%";
      if (elapsed >= INTERVAL) {
        elapsed = 0;
        bar.style.transition = "none";
        bar.style.width = "0%";
        setTimeout(() => {
          bar.style.transition = "width 1s linear";
        }, 50);
        loadClients();
      }
    }

    loadClients();
    setInterval(tick, 1000);
  </script>
</body>
</html>
