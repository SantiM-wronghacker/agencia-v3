<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Línea AI | Dashboard de Automatización</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h1>🚀 En Línea AI</h1>
    <p>Panel de Control de Agentes Autónomos</p>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h4>Nueva Tarea</h4>
                <div class="mb-3">
                    <label class="form-label">¿Qué quieres automatizar?</label>
                    <input type="text" id="taskInput" class="form-control" placeholder="Ej: Auditoría contable...">
                </div>
                <button onclick="enviarTarea()" class="btn btn-primary w-100">Lanzar Agente</button>
            </div>
            
            <div class="card p-4">
                <h4>Estado del Sistema</h4>
                <p>Cerebro Local: <span class="badge bg-success">Activo (GPT-OSS 20B)</span></p>
                <p>Redis: <span class="badge bg-info">Conectado</span></p>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h4>Actividad Reciente</h4>
                <div id="outputLog" class="list-group mt-3">
                    <p class="text-muted">Esperando instrucciones...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function enviarTarea() {
        const query = document.getElementById('taskInput').value;
        const log = document.getElementById('outputLog');
        
        log.innerHTML = `<div class="alert alert-info">🤖 Agente procesando: ${query}...</div>` + log.innerHTML;

        try {
            const response = await fetch('/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            
            log.innerHTML = `<div class="list-group-item">
                <strong>Respuesta:</strong> ${data.response} <br>
                <small class="text-muted">Sesión: ${data.session_id}</small>
            </div>` + log.innerHTML;
        } catch (error) {
            log.innerHTML = `<div class="alert alert-danger">Error: No se pudo conectar con el servidor</div>` + log.innerHTML;
        }
    }
</script>

</body>
</html>
