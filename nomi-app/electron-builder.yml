appId: mx.nomi.app
productName: Nomi
copyright: Copyright © 2026 nomi

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.business

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

dmg:
  title: Nomi ${version}
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

publish:
  provider: generic
  url: https://updates.nomi.mx/releases/
